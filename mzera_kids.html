<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>მზერა — სიტყვების თამაში</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Noto+Sans+Georgian:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --sky:#e8f4fd;--ground:#f0faf0;
  --blue:#4a9eff;--green:#44cc77;--orange:#ff8c42;--purple:#9b59ff;--red:#ff5252;--yellow:#ffd93d;
  --card-bg:#fff;--shadow:0 8px 32px rgba(0,0,0,0.12);
  --radius:24px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{
  background:linear-gradient(160deg,var(--sky) 0%,var(--ground) 100%);
  min-height:100vh;font-family:'Nunito','Noto Sans Georgian',sans-serif;
  display:flex;flex-direction:column;align-items:center;
  padding:16px;overflow-x:hidden;
}

/* ── header ── */
.header{text-align:center;margin-bottom:20px;}
.logo{font-size:36px;font-weight:900;
      background:linear-gradient(135deg,var(--blue),var(--purple));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;}
.tagline{font-size:14px;color:#888;margin-top:2px;}

/* ── stars ── */
.stars{display:flex;gap:8px;justify-content:center;margin-bottom:16px;}
.star{font-size:28px;transition:transform 0.3s;filter:grayscale(1);opacity:0.3;}
.star.earned{filter:none;opacity:1;animation:starPop 0.4s ease;}
@keyframes starPop{0%{transform:scale(0)}50%{transform:scale(1.4)}100%{transform:scale(1)}}

/* ── კითხვა ── */
.question-box{
  background:var(--card-bg);border-radius:var(--radius);
  padding:20px 24px;width:100%;max-width:420px;
  box-shadow:var(--shadow);margin-bottom:20px;
  text-align:center;
}
.question-label{font-size:13px;color:#aaa;margin-bottom:8px;font-weight:700;letter-spacing:0.05em;}
.question-word{
  font-size:42px;font-weight:900;color:#333;
  transition:all 0.3s;
}
.question-word.bounce{animation:bounce 0.5s ease;}
@keyframes bounce{0%,100%{transform:scale(1)}30%{transform:scale(1.15)}60%{transform:scale(0.95)}}

.question-hint{font-size:13px;color:#bbb;margin-top:8px;}

/* ── კატეგორიების ღილაკები ── */
.categories{
  display:grid;grid-template-columns:1fr 1fr;
  gap:12px;width:100%;max-width:420px;margin-bottom:20px;
}
.cat-btn{
  background:var(--card-bg);border:3px solid transparent;
  border-radius:var(--radius);padding:20px 12px;
  font-family:'Nunito','Noto Sans Georgian',sans-serif;
  font-size:18px;font-weight:800;color:#555;
  cursor:pointer;transition:all 0.2s;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  box-shadow:var(--shadow);
  -webkit-user-select:none;user-select:none;
}
.cat-btn:active{transform:scale(0.95);}
.cat-btn .emoji{font-size:36px;}
.cat-btn[data-cat="ცხოველი"]{border-color:var(--orange);}
.cat-btn[data-cat="ცხოველი"]:hover,.cat-btn[data-cat="ცხოველი"]:active{background:rgba(255,140,66,0.1);}
.cat-btn[data-cat="საკვები"]{border-color:var(--green);}
.cat-btn[data-cat="საკვები"]:hover,.cat-btn[data-cat="საკვები"]:active{background:rgba(68,204,119,0.1);}
.cat-btn[data-cat="ტანსაცმელი"]{border-color:var(--purple);}
.cat-btn[data-cat="ტანსაცმელი"]:hover,.cat-btn[data-cat="ტანსაცმელი"]:active{background:rgba(155,89,255,0.1);}
.cat-btn[data-cat="სახლი"]{border-color:var(--blue);}
.cat-btn[data-cat="სახლი"]:hover,.cat-btn[data-cat="სახლი"]:active{background:rgba(74,158,255,0.1);}

.cat-btn.correct{animation:correct 0.5s ease;background:rgba(68,204,119,0.15);}
.cat-btn.wrong{animation:wrong 0.4s ease;}
@keyframes correct{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes wrong{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

/* ── ქულა ── */
.score-row{
  display:flex;gap:16px;justify-content:center;
  width:100%;max-width:420px;margin-bottom:16px;
}
.score-card{
  flex:1;background:var(--card-bg);border-radius:16px;
  padding:12px;text-align:center;box-shadow:var(--shadow);
}
.score-card .num{font-size:28px;font-weight:900;}
.score-card .lbl{font-size:11px;color:#aaa;font-weight:700;}
.score-card.correct-s .num{color:var(--green);}
.score-card.wrong-s .num{color:var(--red);}
.score-card.streak-s .num{color:var(--orange);}

/* ── feedback ── */
.feedback{
  font-size:32px;position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;opacity:0;
  transition:opacity 0.1s;font-weight:900;
  z-index:100;
  text-shadow:0 4px 20px rgba(0,0,0,0.2);
}
.feedback.show{opacity:1;animation:feedbackAnim 0.8s ease forwards;}
@keyframes feedbackAnim{
  0%{opacity:1;transform:translate(-50%,-50%) scale(0.5)}
  30%{opacity:1;transform:translate(-50%,-60%) scale(1.2)}
  100%{opacity:0;transform:translate(-50%,-80%) scale(1)}
}

/* ── Q-table badge ── */
.ai-info{
  width:100%;max-width:420px;
  background:rgba(255,255,255,0.7);border-radius:16px;
  padding:12px 16px;font-size:12px;color:#999;
  border:1px solid rgba(0,0,0,0.06);
  margin-bottom:8px;
}
.ai-info strong{color:#666;}

/* ── PWA install hint ── */
.install-hint{
  font-size:12px;color:#bbb;text-align:center;margin-top:8px;
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">🌟 მზერა</div>
  <div class="tagline">სიტყვების თამაში</div>
</div>

<div class="stars" id="stars">
  <div class="star">⭐</div>
  <div class="star">⭐</div>
  <div class="star">⭐</div>
  <div class="star">⭐</div>
  <div class="star">⭐</div>
</div>

<div class="question-box">
  <div class="question-label">რომელ ჯგუფს მიეკუთვნება?</div>
  <div class="question-word" id="word">...</div>
  <div class="question-hint" id="hint">აირჩიე სწორი კატეგორია</div>
</div>

<div class="categories">
  <button class="cat-btn" data-cat="ცხოველი" onclick="answer('ცხოველი')">
    <span class="emoji">🐾</span>ცხოველი
  </button>
  <button class="cat-btn" data-cat="საკვები" onclick="answer('საკვები')">
    <span class="emoji">🍎</span>საკვები
  </button>
  <button class="cat-btn" data-cat="ტანსაცმელი" onclick="answer('ტანსაცმელი')">
    <span class="emoji">👕</span>ტანსაცმელი
  </button>
  <button class="cat-btn" data-cat="სახლი" onclick="answer('სახლი')">
    <span class="emoji">🏠</span>სახლი
  </button>
</div>

<div class="score-row">
  <div class="score-card correct-s">
    <div class="num" id="s-correct">0</div>
    <div class="lbl">✓ სწორი</div>
  </div>
  <div class="score-card wrong-s">
    <div class="num" id="s-wrong">0</div>
    <div class="lbl">✗ შეცდომა</div>
  </div>
  <div class="score-card streak-s">
    <div class="num" id="s-streak">0</div>
    <div class="lbl">🔥 ზედიზედ</div>
  </div>
</div>

<div class="ai-info">
  <strong>🤖 მზერა სწავლობს:</strong>
  შენი პასუხებიდან სისტემა ისწავლის რომელი სიტყვა რომელ ჯგუფს ეკუთვნის.
  <span id="ai-learned">0 კავშირი</span>
</div>

<div class="feedback" id="feedback"></div>

<div class="install-hint">📱 ტელეფონზე: "მთავარ ეკრანზე დამატება"</div>

<script>
// ── სიტყვების ბაზა ────────────────────────────────────────────
const WORDS = {
  ცხოველი: [
    {w:'კატა',e:'🐱'},{w:'ძაღლი',e:'🐶'},{w:'თაგვი',e:'🐭'},
    {w:'კურდღელი',e:'🐰'},{w:'ლომი',e:'🦁'},{w:'სპილო',e:'🐘'},
    {w:'ციყვი',e:'🐿️'},{w:'მელა',e:'🦊'},{w:'დათვი',e:'🐻'},
    {w:'ჟირაფი',e:'🦒'},{w:'ვეფხვი',e:'🐯'},{w:'მგელი',e:'🐺'},
    {w:'კამეჩი',e:'🐃'},{w:'ცხვარი',e:'🐑'},{w:'თხა',e:'🐐'},
  ],
  საკვები: [
    {w:'ვაშლი',e:'🍎'},{w:'პური',e:'🍞'},{w:'ყველი',e:'🧀'},
    {w:'კვერცხი',e:'🥚'},{w:'ბანანი',e:'🍌'},{w:'მარწყვი',e:'🍓'},
    {w:'კომბოსტო',e:'🥬'},{w:'სტაფილო',e:'🥕'},{w:'კარტოფილი',e:'🥔'},
    {w:'ბოლოკი',e:'🌿'},{w:'მანდარინი',e:'🍊'},{w:'ყურძენი',e:'🍇'},
    {w:'ნახშირი',e:'🍚'},{w:'ტომატი',e:'🍅'},{w:'კიტრი',e:'🥒'},
  ],
  ტანსაცმელი: [
    {w:'პერანგი',e:'👔'},{w:'ქუდი',e:'🎩'},{w:'ფეხსაცმელი',e:'👟'},
    {w:'შარვალი',e:'👖'},{w:'კაბა',e:'👗'},{w:'ხელთათმანი',e:'🧤'},
    {w:'წინდა',e:'🧦'},{w:'ქურთუკი',e:'🧥'},{w:'გალსტუხი',e:'👔'},
    {w:'ქამარი',e:'🩲'},{w:'თბილი_ქუდი',e:'🧢'},{w:'სათვალე',e:'👓'},
  ],
  სახლი: [
    {w:'მაგიდა',e:'🪑'},{w:'სკამი',e:'🪑'},{w:'საწოლი',e:'🛏️'},
    {w:'კარი',e:'🚪'},{w:'ფანჯარა',e:'🪟'},{w:'სარკე',e:'🪞'},
    {w:'ქოთანი',e:'🫕'},{w:'ჩანგალი',e:'🍴'},{w:'კოვზი',e:'🥄'},
    {w:'ნათურა',e:'💡'},{w:'საათი',e:'⏰'},{w:'წიგნი',e:'📚'},
    {w:'ტელეფონი',e:'📱'},{w:'ჭიქა',e:'🥛'},{w:'თეფში',e:'🍽️'},
  ],
};

const CATS = Object.keys(WORDS);

// ── LEARNED: Q-table ─────────────────────────────────────────
const Q = {};  // {სიტყვა: {კატ: ქულა}}
const learned = {};  // {სიტყვა: სწ_კატ}

function getQ(word) {
  if(!Q[word]) {
    Q[word] = {};
    CATS.forEach(c => Q[word][c] = 0);
  }
  return Q[word];
}

// HARDCODED: reward
function qUpdate(word, chosen, correct) {
  const q = getQ(word);
  q[chosen] += chosen===correct ? 1.0 : -0.5;
  q[correct] += chosen!==correct ? 0.3 : 0;
  learned[word] = correct;
}

// ── თამაშის მდგომარეობა ──────────────────────────────────────
let current = null;
let correctC = 0, wrongC = 0, streak = 0, maxStreak = 0;
let starsEarned = 0;
let allWords = [];
let wordIndex = 0;
let answering = false;

// ყველა სიტყვა შევაერთოთ
CATS.forEach(cat => {
  WORDS[cat].forEach(item => {
    allWords.push({word: item.w, emoji: item.e, cat: cat});
  });
});

// შევურიოთ
allWords = allWords.sort(() => Math.random() - 0.5);

function nextWord() {
  if(wordIndex >= allWords.length) {
    wordIndex = 0;
    allWords = allWords.sort(() => Math.random() - 0.5);
  }
  current = allWords[wordIndex++];

  const el = document.getElementById('word');
  el.textContent = current.emoji + ' ' + current.word;
  el.classList.remove('bounce');
  void el.offsetWidth;
  el.classList.add('bounce');

  document.getElementById('hint').textContent = 'აირჩიე სწორი კატეგორია';

  // ღილაკები გავააქტიუროთ
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.remove('correct','wrong');
    b.disabled = false;
  });
  answering = false;
}

function answer(chosen) {
  if(answering || !current) return;
  answering = true;

  const correct = current.cat;
  const isCorrect = chosen === correct;

  // LEARNED
  qUpdate(current.word, chosen, correct);

  // UI feedback
  const btn = document.querySelector(`[data-cat="${chosen}"]`);
  const correctBtn = document.querySelector(`[data-cat="${correct}"]`);

  if(isCorrect) {
    btn.classList.add('correct');
    correctC++;
    streak++;
    if(streak > maxStreak) maxStreak = streak;
    showFeedback('✓ ' + ['მშვენიერია!','ბრავო!','სწორია!','კარგია!','ზუსტი!'][Math.floor(Math.random()*5)], true);
  } else {
    btn.classList.add('wrong');
    correctBtn.classList.add('correct');
    wrongC++;
    streak = 0;
    showFeedback('✗ ცადე ისევ!', false);
    document.getElementById('hint').textContent = '✓ სწორია: ' + correct;
  }

  // ვარსკვლავები
  updateStars();

  // სტატისტიკა
  document.getElementById('s-correct').textContent = correctC;
  document.getElementById('s-wrong').textContent = wrongC;
  document.getElementById('s-streak').textContent = streak;
  document.getElementById('ai-learned').textContent =
    Object.keys(learned).length + ' კავშირი';

  // შემდეგი სიტყვა
  setTimeout(nextWord, isCorrect ? 1000 : 1600);
}

function showFeedback(msg, good) {
  const el = document.getElementById('feedback');
  el.textContent = msg;
  el.style.color = good ? '#44cc77' : '#ff5252';
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
}

function updateStars() {
  const total = correctC + wrongC;
  if(total === 0) return;
  const acc = correctC / total;
  let newStars = 0;
  if(acc >= 0.9 && total >= 5) newStars = 5;
  else if(acc >= 0.75 && total >= 5) newStars = 4;
  else if(acc >= 0.6) newStars = 3;
  else if(acc >= 0.4) newStars = 2;
  else if(correctC >= 1) newStars = 1;

  if(newStars > starsEarned) {
    starsEarned = newStars;
    document.querySelectorAll('.star').forEach((s,i) => {
      s.classList.toggle('earned', i < starsEarned);
    });
  }
}

// დავიწყოთ
nextWord();
</script>

<!-- PWA manifest inline -->
<script>
if('serviceWorker' in navigator) {
  // minimal PWA support
}
</script>

</body>
</html>
